# =============================================================================
# openvpn-client-proxy — example docker-compose with all options
# =============================================================================
#
# Environment variables for DNS:
#
#  ENABLE_DOT           Enable DNS-over-TLS via unbound (default: false)
#                       If true: dnsmasq → local unbound (127.0.0.1:5053) → DoT
#                       If false: dnsmasq → DNS_SERVER_1 / DNS_SERVER_2 in cleartext
#
#  DOT_DNS_SERVERS      DoT servers to use when ENABLE_DOT=true
#                       Format: "tls://hostname" or "https://hostname", separated
#                       by spaces or commas
#                       Default: tls://dns.adguard-dns.com
#
#  DNS_SERVER_1/2       Used only if ENABLE_DOT=false
#                       Default: 94.140.14.14 / 94.140.15.15 (AdGuard DNS)
#
#  ENABLE_DNSSEC        Strict DNSSEC validation via unbound (default: false)
#                       Requires ENABLE_DOT=true.
#
#  DOT_TLS_CERT_BUNDLE  CA PEM bundle for DoT certificate pinning.
#                       Default: system CA bundle on Alpine.
#
#  DOT_IP_REFRESH_INTERVAL
#                       Interval (seconds) to re-resolve DoT hostnames.
#                       Default: 3600. Set to 0 to disable.
#
#  DNS_SPLIT            Split DNS: "domain=resolver[:port]" separated by commas.
#                       Example: "corp.local=10.0.0.53,internal.net=10.0.1.53:5353"
#
# Firewall (managed automatically):
#   ENABLE_DOT=false  → UDP/TCP 53 ALLOWED to DNS_SERVER_1/2
#   ENABLE_DOT=true   → TCP 853 ALLOWED to DoT IPs — external UDP/TCP 53 BLOCKED
#
# Metrics:
#   ENABLE_METRICS=true → Prometheus endpoint on 127.0.0.1:9100 (loopback only)
#   DO NOT bind 9100 to 0.0.0.0 — access via SSH tunnel or sidecar
#
# Security:
#   DROP_CAPS=true → drops all Linux capabilities except CAP_NET_ADMIN
#                    and CAP_NET_RAW after services start.
# =============================================================================

services:
  vpn:
    build: .
    # image: ghcr.io/yourname/openvpn-client-proxy:latest
    container_name: openvpn-client-proxy
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ./vpn:/vpn:ro
      - tailscale-data:/var/lib/tailscale
      # Certificate pinning for DoT (optional):
      # - ./my-dot-ca.pem:/vpn/dot-ca.pem:ro
    ports:
      - "3128:3128"   # HTTP proxy (Privoxy or nginx if auth enabled)
      # Prometheus metrics — loopback only, DO NOT expose publicly
      # Access via: docker exec <container> curl http://127.0.0.1:9100/metrics
      # - "127.0.0.1:9100:9100"

    environment:
      # -----------------------------------------------------------------------
      # Classic DNS (ENABLE_DOT=false, default)
      # -----------------------------------------------------------------------
      ENABLE_DOT: "false"
      DNS_SERVER_1: "94.140.14.14"
      DNS_SERVER_2: "94.140.15.15"

      # -----------------------------------------------------------------------
      # DNS-over-TLS — uncomment this block and comment out the classic DNS block
      # -----------------------------------------------------------------------
      # ENABLE_DOT: "true"
      # DOT_DNS_SERVERS: "tls://dns.adguard-dns.com"
      # Multiple servers:
      # DOT_DNS_SERVERS: "tls://dns.adguard-dns.com tls://cloudflare-dns.com"
      # DNS-over-HTTPS:
      # DOT_DNS_SERVERS: "https://cloudflare-dns.com"

      # -----------------------------------------------------------------------
      # Strict DNSSEC (requires ENABLE_DOT=true)
      # Warning: unsigned DNS zones will fail if enabled
      # -----------------------------------------------------------------------
      ENABLE_DNSSEC: "false"

      # -----------------------------------------------------------------------
      # Certificate pinning for DoT (optional, requires ENABLE_DOT=true)
      # Mount the bundle via the volumes section before enabling
      # -----------------------------------------------------------------------
      # DOT_TLS_CERT_BUNDLE: "/vpn/dot-ca.pem"

      # -----------------------------------------------------------------------
      # Dynamic refresh of DoT IPs (default: 3600s, 0 = disabled)
      # -----------------------------------------------------------------------
      DOT_IP_REFRESH_INTERVAL: "3600"

      # -----------------------------------------------------------------------
      # Split DNS (optional) — "domain=resolver[:port]" separated by commas
      # -----------------------------------------------------------------------
      # DNS_SPLIT: "corp.local=10.0.0.53,internal.net=10.0.1.53:5353"

      # -----------------------------------------------------------------------
      # Proxy auth (optional) — enables nginx in front with HTTP Basic Auth
      # -----------------------------------------------------------------------
      PROXY_USER: ""
      PROXY_PASS: ""

      # -----------------------------------------------------------------------
      # Prometheus metrics on 127.0.0.1:9100 (loopback, iptables enforced)
      # -----------------------------------------------------------------------
      ENABLE_METRICS: "false"

      # -----------------------------------------------------------------------
      # Capability drop — removes all caps except CAP_NET_ADMIN + CAP_NET_RAW
      # -----------------------------------------------------------------------
      DROP_CAPS: "false"

      # -----------------------------------------------------------------------
      # Tailscale (optional)
      # -----------------------------------------------------------------------
      ENABLE_TAILSCALE: "false"
      # TAILSCALE_AUTHKEY: "tskey-auth-xxxx"
      # TAILSCALE_HOSTNAME: "openvpn-proxy"
      # TAILSCALE_ACCEPT_ROUTES: "false"
      # TAILSCALE_ADVERTISE_EXIT_NODE: "false"
      # TAILSCALE_FLAGS: ""

    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      # Required only if TAILSCALE_ADVERTISE_EXIT_NODE=true:
      # - net.ipv4.ip_forward=1
      # - net.ipv6.conf.all.forwarding=1

    deploy:
      resources:
        limits:
          memory: 128M   # 192M if auth enabled, 256M if Tailscale enabled

    restart: unless-stopped

volumes:
  tailscale-data:
